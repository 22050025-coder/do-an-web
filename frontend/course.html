<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết khóa học | CourseHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .course-detail-header {
            background-color: var(--dark-color);
            color: white;
            padding: 120px 0 60px;
        }
        .course-detail-header h1, .course-detail-header p {
            color: white;
        }
        .course-detail-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            padding: 60px 0;
        }
        .enroll-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 100px;
            border: 1px solid var(--border-color);
        }
        .price-tag {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-graduation-cap"></i> CourseHub
            </a>
            <div class="nav-links">
                <a href="index.html">Trang chủ</a>
                <a href="index.html#courses">Khóa học</a>
            </div>
            <div class="nav-auth" id="nav-auth"></div>
        </div>
    </nav>

    <div class="course-detail-header">
        <div class="container" id="course-header-content">
            <h1>Đang tải...</h1>
        </div>
    </div>

    <div class="container course-detail-content">
        <div class="course-main">
            <h2>Mô tả khóa học</h2>
            <div id="course-desc" style="margin-top: 20px; line-height: 1.8; color: var(--gray-color);">
                Đang tải mô tả...
            </div>

            <h2 style="margin-top: 40px; margin-bottom: 20px;">Đề cương khóa học</h2>
            <div id="course-syllabus" style="background: white; border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden;">
                <div style="padding: 20px; text-align: center; color: var(--gray-color);">Đang tải danh sách bài học...</div>
            </div>
        </div>
        <div class="course-sidebar">
            <div class="enroll-card">
                <div class="price-tag" id="course-price">0 đ</div>
                <button id="enroll-btn" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 15px;">Mua khóa học</button>
                <div id="enroll-msg" style="margin-top: 15px; text-align: center;"></div>
                <ul style="margin-top: 20px; list-style: none; color: var(--gray-color); line-height: 2;">
                    <li><i class="fas fa-video text-primary"></i> 20+ giờ học video</li>
                    <li><i class="fas fa-certificate text-primary"></i> Cấp chứng chỉ sau khi hoàn thành</li>
                    <li><i class="fas fa-infinity text-primary"></i> Truy cập trọn đời</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('id');
            
            if (!courseId) {
                document.getElementById('course-header-content').innerHTML = '<h1>Không tìm thấy khóa học</h1>';
                return;
            }

            let course = null;
            try {
                const data = await apiFetch(`/courses/${courseId}`);
                course = data.data;
                const instructorName = course.instructor ? course.instructor.name : 'Chưa có giảng viên';

                document.getElementById('course-header-content').innerHTML = `
                    <h1 style="font-size: 2.5rem; margin-bottom: 15px;">${course.title}</h1>
                    <p style="font-size: 1.1rem; opacity: 0.9;">Được hướng dẫn bởi: ${instructorName}</p>
                `;
                document.getElementById('course-desc').textContent = course.description;
                document.getElementById('course-price').textContent = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(course.price);

                // Tải danh sách bài học
                const lessonsData = await apiFetch(`/courses/${courseId}/lessons`);
                const syllabusContainer = document.getElementById('course-syllabus');
                if (lessonsData.data.length === 0) {
                    syllabusContainer.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--gray-color);">Nội dung khóa học đang được cập nhật.</div>';
                } else {
                    let syllabusHtml = '';
                    lessonsData.data.forEach((lesson, idx) => {
                        syllabusHtml += `
                            <div style="padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px;">
                                <div style="background: var(--light-color); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: var(--gray-color);">${idx + 1}</div>
                                <div style="flex: 1; font-weight: 500;">${lesson.title}</div>
                                ${lesson.videoUrl ? '<i class="fas fa-play-circle" style="color: var(--primary-color);"></i>' : '<i class="fas fa-file-alt" style="color: var(--gray-color);"></i>'}
                            </div>
                        `;
                    });
                    syllabusContainer.innerHTML = syllabusHtml;
                }

                // Kiểm tra trạng thái đăng ký
                if (TokenService.getUser()) {
                    const enrollData = await apiFetch(`/courses/${courseId}/enroll`);
                    if (enrollData.isEnrolled) {
                        document.getElementById('course-price').textContent = '0 đ';
                        const btn = document.getElementById('enroll-btn');
                        btn.textContent = 'Vào học ngay';
                        btn.onclick = () => { window.location.href = `learn.html?courseId=${courseId}`; };
                        // Hủy sự kiện click cũ bằng cách thay thế node (vì onclick ở trên sẽ ghi đè không hoàn toàn nếu event listener tồn tại)
                        const newBtn = btn.cloneNode(true);
                        btn.parentNode.replaceChild(newBtn, btn);
                    }
                }
            } catch (error) {
                console.error(error);
            }

            // Xử lý đăng ký
            document.getElementById('enroll-btn')?.addEventListener('click', async (e) => {
                // Nếu nút là Vào học ngay thì bỏ qua (đã gán ở trên)
                if (e.target.textContent === 'Vào học ngay') return;

                const user = TokenService.getUser();
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }

                if (!confirm(`Xác nhận mua khóa học này với giá ${new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(course.price)}?\nSố tiền sẽ được trừ trực tiếp vào Ví của bạn.`)) return;

                const msg = document.getElementById('enroll-msg');
                const btn = e.target;
                btn.disabled = true;
                btn.textContent = 'Đang xử lý...';

                try {
                    await apiFetch(`/courses/${courseId}/enroll`, { method: 'POST' });
                    document.getElementById('course-price').textContent = '0 đ';
                    msg.innerHTML = '<span style="color: var(--secondary-color)">Mua khóa học thành công!</span>';
                    btn.textContent = 'Vào học ngay';
                    btn.disabled = false;
                    btn.onclick = () => { window.location.href = `learn.html?courseId=${courseId}`; };
                } catch (error) {
                    msg.innerHTML = `<span style="color: var(--danger-color)">${error.message}</span>`;
                    btn.disabled = false;
                    btn.textContent = 'Mua khóa học';
                }
            });
        });
    </script>
</body>
</html>
