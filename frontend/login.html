<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | CourseHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-graduation-cap"></i> CourseHub
            </a>
            <div class="nav-links">
                <a href="index.html">Trang chủ</a>
                <a href="index.html#courses">Khóa học</a>
            </div>
        </div>
    </nav>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Đăng nhập</h2>
                <p>Chào mừng bạn trở lại với CourseHub</p>
            </div>
            
            <div id="error-message" style="display: none; color: var(--danger-color); margin-bottom: 15px; text-align: center;"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="Nhập email của bạn">
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" class="form-control" required placeholder="Nhập mật khẩu">
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">Đăng nhập</button>
            </form>
            
            <p class="text-center" style="margin-top: 20px;">
                Chưa có tài khoản? <a href="register.html" class="text-primary">Đăng ký ngay</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const loginBtn = document.getElementById('login-btn');
            
            errorDiv.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Đang xử lý...';
            
            try {
                const data = await apiFetch('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                
                // Lưu token và user info
                TokenService.setToken(data.token);
                TokenService.setUser(data.user);
                
                // Chuyển hướng về trang chủ
                window.location.href = 'index.html';
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Đăng nhập';
            }
        });
    </script>
</body>
</html>
