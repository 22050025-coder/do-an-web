<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân | CourseHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-container {
            padding: 100px 20px 60px;
            max-width: 800px;
            margin: 0 auto;
        }
        .profile-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow-md);
            margin-bottom: 30px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 600;
        }
        .profile-info h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .profile-info p {
            color: var(--gray-color);
        }
        .enrollments-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .enrollment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
        .wallet-card {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tx-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .tx-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-graduation-cap"></i> CourseHub
            </a>
            <div class="nav-links">
                <a href="index.html">Trang chủ</a>
                <a href="index.html#courses">Khóa học</a>
            </div>
            <div class="nav-auth" id="nav-auth">
                <!-- Render từ JS -->
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar" id="avatar-letter">U</div>
                <div class="profile-info">
                    <h2 id="profile-name">Tên người dùng</h2>
                    <p id="profile-email">email@example.com</p>
                    <span class="badge" id="profile-role" style="display: inline-block; padding: 4px 8px; background: var(--border-color); border-radius: 4px; font-size: 0.8rem; margin-top: 5px;">Học viên</span>
                </div>
            </div>
            
            <h3>Cập nhật thông tin</h3>
            <form id="update-profile-form" style="margin-top: 15px;">
                <div class="form-group">
                    <label>Họ và tên mới</label>
                    <input type="text" id="new-name" class="form-control" placeholder="Nhập tên mới">
                </div>
                <button type="submit" class="btn btn-outline">Cập nhật</button>
            </form>
            <div id="update-msg" style="margin-top: 10px;"></div>
        </div>

        <div class="wallet-card">
            <div>
                <p style="margin: 0; opacity: 0.8; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px;">Số dư khả dụng</p>
                <h2 id="wallet-balance" style="margin: 5px 0 0 0; font-size: 2.2rem;">0 đ</h2>
            </div>
            <div>
                <button class="btn" style="background: white; color: #4f46e5; font-weight: 600; padding: 12px 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);" onclick="depositMoney()">
                    <i class="fas fa-plus-circle"></i> Nạp tiền
                </button>
            </div>
        </div>

        <div class="profile-card">
            <h3>Lịch sử giao dịch</h3>
            <div id="tx-list" style="margin-top: 15px;">
                <p style="color: var(--gray-color);">Đang tải dữ liệu...</p>
            </div>
        </div>

        <div class="profile-card">
            <h3>Khóa học đã đăng ký</h3>
            <div class="enrollments-list" id="enrollments-list" style="margin-top: 15px;">
                <p>Đang tải dữ liệu...</p>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = TokenService.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Lấy thông tin user mới nhất
            try {
                const profileRes = await apiFetch('/users/profile');
                if (profileRes.success) {
                    const latestUser = profileRes.data;
                    document.getElementById('profile-name').textContent = latestUser.name;
                    document.getElementById('profile-email').textContent = latestUser.email;
                    document.getElementById('avatar-letter').textContent = latestUser.name.charAt(0).toUpperCase();
                    document.getElementById('profile-role').textContent = latestUser.role === 'admin' ? 'Quản trị viên' : 'Học viên';
                    
                    const formattedBalance = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(latestUser.balance || 0);
                    document.getElementById('wallet-balance').textContent = formattedBalance;
                }
            } catch (err) {
                console.error("Failed to fetch profile", err);
            }

            // Xử lý form cập nhật tên
            document.getElementById('update-profile-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newName = document.getElementById('new-name').value;
                const msg = document.getElementById('update-msg');
                
                try {
                    const data = await apiFetch('/users/profile', {
                        method: 'PUT',
                        body: JSON.stringify({ name: newName })
                    });
                    
                    if (data.success) {
                        // Cập nhật lại LS
                        const currentUser = TokenService.getUser();
                        currentUser.name = data.data.name;
                        TokenService.setUser(currentUser);
                        
                        document.getElementById('profile-name').textContent = data.data.name;
                        document.getElementById('avatar-letter').textContent = data.data.name.charAt(0).toUpperCase();
                        msg.innerHTML = '<span style="color: var(--secondary-color)">Cập nhật thành công!</span>';
                        updateNavAuth(); // Cập nhật lại navbar
                    }
                } catch (error) {
                    msg.innerHTML = `<span style="color: var(--danger-color)">Lỗi: ${error.message}</span>`;
                }
            });

            // Lấy danh sách khóa học
            try {
                const data = await apiFetch('/enrollments');
                const list = document.getElementById('enrollments-list');
                
                if (data.data.length === 0) {
                    list.innerHTML = '<p>Bạn chưa đăng ký khóa học nào.</p>';
                    return;
                }
                
                list.innerHTML = '';
                data.data.forEach(enrollment => {
                    const course = enrollment.course;
                    list.innerHTML += `
                        <div class="enrollment-item">
                            <div>
                                <h4 style="margin-bottom: 5px">${course.title}</h4>
                                <p style="font-size: 0.9rem; color: var(--gray-color)">Ngày đăng ký: ${new Date(enrollment.createdAt).toLocaleDateString('vi-VN')}</p>
                            </div>
                            <a href="learn?courseId=${course._id}" class="btn btn-primary" style="padding: 5px 15px">Vào học</a>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('enrollments-list').innerHTML = '<p>Không thể tải danh sách khóa học.</p>';
            }

            // Lấy danh sách giao dịch
            try {
                const txData = await apiFetch('/transactions/me');
                const txList = document.getElementById('tx-list');
                
                if (txData.data.length === 0) {
                    txList.innerHTML = '<p style="color: var(--gray-color);">Chưa có giao dịch nào.</p>';
                } else {
                    txList.innerHTML = '';
                    txData.data.forEach(tx => {
                        const date = new Date(tx.createdAt).toLocaleDateString('vi-VN');
                        const amount = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(tx.amount);
                        const isDeposit = tx.type === 'deposit';
                        
                        let statusColor = tx.status === 'completed' ? '#10b981' : (tx.status === 'pending' ? '#eab308' : '#ef4444');
                        let statusText = tx.status === 'completed' ? 'Thành công' : (tx.status === 'pending' ? 'Chờ duyệt' : 'Thất bại');
                        
                        txList.innerHTML += `
                            <div class="tx-item">
                                <div>
                                    <strong style="color: #1e293b;">${tx.description}</strong>
                                    <div style="font-size: 0.85rem; color: #64748b; margin-top: 4px;">${date} &bull; <span style="color: ${statusColor}">${statusText}</span></div>
                                </div>
                                <div style="font-weight: 700; color: ${isDeposit ? '#10b981' : '#ef4444'};">
                                    ${isDeposit ? '+' : '-'}${amount}
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                document.getElementById('tx-list').innerHTML = '<p style="color: var(--danger-color);">Lỗi tải lịch sử giao dịch.</p>';
            }
        });

        async function depositMoney() {
            const amountStr = prompt("Nhập số tiền muốn nạp (VND):\nVí dụ: 500000");
            if (!amountStr) return;
            
            const amount = parseInt(amountStr);
            if (isNaN(amount) || amount <= 0) {
                alert("Số tiền không hợp lệ!");
                return;
            }

            try {
                const res = await apiFetch('/transactions/deposit', {
                    method: 'POST',
                    body: JSON.stringify({
                        amount: amount,
                        description: 'Nạp tiền vào ví CourseHub'
                    })
                });
                
                alert("Yêu cầu nạp tiền đã được gửi. Vui lòng chờ Quản trị viên duyệt (Lưu ý: Chuyển khoản nội dung: Naptien " + res.data._id.substring(0,6) + ")");
                window.location.reload();
            } catch (error) {
                alert("Lỗi: " + error.message);
            }
        }
    </script>
</body>
</html>
